syntax = "proto3";

import "base/v1/rpc.report.proto";
import "base/v1/rpc.target.proto";

option java_outer_classname = "myGaruSDK";
option go_package = "github.com/mygaru/dcr-sdk/gen/base1;base";

package contract;


// High-QPS service.
// EvaluateStream should be the primary transport for sustained load.
service ContractService {
  rpc Target(target.TargetRequest) returns (target.TargetResponse);
  rpc TargetStream(stream target.TargetRequest) returns (stream target.TargetResponse);

  rpc ReportStream(stream report.ReportRequest) returns (stream report.ReportResponse);

}

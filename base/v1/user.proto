syntax = "proto3";

option java_outer_classname = "myGaruSDK";
option go_package = "github.com/mygaru/dcr-sdk/gen/base1;base";

package user;

// Represents contextual information for the user request
message Context {
  bytes ip = 1;   // IP address of the user
  bytes ua = 2;   // User agent string
  bytes url = 3;  // Current URL
  bytes referrer = 4;     // Referrer URL
}

message UID {
  bytes id = 1; // The identifier
  Type type = 2; // The type of the ID

  // Type of deterministic identifier
  enum Type {
    OTP = 0;
    PARTNER_UID = 2;
    DEVICE_ID = 3;
    EXTERNAL_UID = 4;
  }

}